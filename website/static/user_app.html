<!DOCTYPE html>
<html lang="it" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VeriTwin | Driver App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 400: '#5cffff', 500: '#00E5FF', 600: '#00b8cc' }, darkbg: '#050a11', cardbg: '#0f1725' } } } }
    </script>
    <style>
        body {
            background-color: #050a11;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: #0f1725;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .glow-ring {
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.15), inset 0 0 20px rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .app-view {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .app-view.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .vehicle-chip {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .vehicle-chip:hover {
            border-color: rgba(0, 229, 255, 0.3);
        }

        .vehicle-chip.active {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(0, 229, 255, 0.05));
            border-color: rgba(0, 229, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        /* AI Modal Table Styling */
        #ai-email-output table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.875rem;
            text-align: left;
            border-radius: 0.75rem;
            border: 1px solid rgba(0, 229, 255, 0.2);
            background: rgba(15, 23, 37, 0.8);
            display: block;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
        }

        #ai-email-output th {
            background-color: rgba(0, 229, 255, 0.1);
            color: #5cffff;
            padding: 0.875rem 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        #ai-email-output td {
            padding: 0.875rem 1rem;
            color: #e2e8f0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        #ai-email-output tbody tr:last-child td {
            border-bottom: none;
            font-weight: 700;
            color: #5cffff;
        }

        #ai-email-output tbody tr:hover {
            background-color: rgba(0, 229, 255, 0.05);
        }
    </style>
</head>

<body class="h-[100dvh] w-screen flex flex-col overflow-hidden relative pb-[80px]">
    <script src="/static/js/i18n.js?v=8"></script>

    <!-- Language Toggle -->
    <div class="flex justify-end px-5 pt-3 pb-0 max-w-lg mx-auto w-full shrink-0">
        <div class="flex items-center gap-1 bg-slate-800/60 rounded-full p-0.5 border border-white/5">
            <button id="lang-en-app"
                onclick="window.setLanguage('en'); window.rerenderDriverApp && window.rerenderDriverApp();"
                class="px-3 py-1.5 rounded-full text-[10px] font-bold transition-all text-slate-400 hover:text-white bg-transparent shadow-none">EN</button>
            <button id="lang-it-app"
                onclick="window.setLanguage('it'); window.rerenderDriverApp && window.rerenderDriverApp();"
                class="px-3 py-1.5 rounded-full text-[10px] font-bold transition-all bg-brand-500 text-slate-900 shadow-[0_0_10px_rgba(0,229,255,0.4)]">IT</button>
        </div>
    </div>

    <div id="view-home"
        class="app-view active flex-col h-full overflow-y-auto hide-scrollbar px-5 pt-6 pb-6 mx-auto max-w-lg w-full">

        <header class="flex items-center justify-between mb-8">
            <div>
                <p class="text-slate-400 text-sm font-medium mb-1">VeriTwin Home</p>
                <h1 id="driver-greeting" class="text-2xl font-bold tracking-tight" data-i18n="driver-loading">
                    Caricamento...</h1>
            </div>
            <div class="flex items-center gap-3">
                <a href="/dashboard"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-slate-800 border border-slate-600 text-slate-300 hover:text-white transition-all shadow-lg group">
                    <span class="text-sm">🏢</span>
                    <span class="text-[10px] font-bold tracking-wide uppercase" data-i18n="driver-portal">Portal</span>
                </a>
            </div>
        </header>

        <div id="vehicle-strip-container" class="flex gap-3 overflow-x-auto hide-scrollbar mb-8 -mx-5 px-5"></div>
        <div id="top-alert-container"></div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass-card p-4 flex flex-col justify-start min-h-[160px] relative overflow-hidden group">
                <img id="active-vehicle-photo" src="" alt="Car" onerror="this.classList.add('hidden')"
                    class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-90 transition-opacity duration-500 hidden" />
                <div class="absolute inset-0 bg-gradient-to-b from-[#0f1725]/90 via-[#0f1725]/30 to-transparent"></div>
                <div class="relative z-10">
                    <p class="text-[10px] font-bold text-slate-300 mb-0.5 uppercase tracking-wider"
                        data-i18n="driver-veicolo-attivo">Veicolo Attivo</p>
                    <h4 id="active-vehicle-name" class="font-bold text-[15px] leading-tight text-white drop-shadow-lg">
                        --</h4>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="glass-card p-4 flex flex-col justify-center flex-1 relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 opacity-5">
                        <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        </svg>
                    </div>
                    <p class="text-[10px] font-bold text-emerald-400 uppercase tracking-wide mb-1 relative z-10">VSI
                        Score</p>
                    <div class="flex items-baseline gap-1 relative z-10">
                        <span id="active-vehicle-vsi" class="text-3xl font-black text-white drop-shadow-md">--</span>
                        <span class="text-xs text-slate-500 font-bold">/100</span>
                    </div>
                </div>

                <div class="glass-card p-4 flex flex-col justify-center flex-1">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1"

                    <div class="flex items-baseline gap-1">
                        <span class="text-xl font-black text-brand-400">-14</span>
                        <span class="text-sm font-bold text-brand-400">%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-1"
                data-i18n="driver-stato-componenti">Stato Componenti</h3>
            <div id="component-health-container">
            </div>
        </div>
    </div>

    <div id="view-alert" class="app-view flex-col h-full overflow-y-auto px-5 pb-8 pt-4 mx-auto max-w-lg w-full">
        <header class="flex items-center justify-between mb-8 shrink-0">
            <button onclick="window.switchView('view-home')"
                class="text-white p-2 -ml-2 hover:text-brand-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
            </button>
            <h1 class="text-[15px] font-semibold tracking-wide text-slate-200" data-i18n="driver-dettagli-avvisi">
                Dettagli Avvisi</h1>
            <div class="w-6"></div>
        </header>
        <div id="alerts-list-container" class="flex flex-col gap-3"></div>
    </div>

    <div id="view-profile" class="app-view flex-col h-full overflow-y-auto px-5 pb-8 pt-4 mx-auto max-w-lg w-full">
        <header class="flex items-center justify-between mb-6 shrink-0">
            <h1 class="text-[17px] font-semibold tracking-wide text-white" data-i18n="driver-nav-gestione-header">
                Gestione
                Veicolo</h1>
        </header>
        <div id="profile-content-container" class="flex flex-col">
        </div>
    </div>

    <div id="view-map" class="app-view flex-col h-full bg-slate-900">
        <header class="flex items-center justify-between px-4 py-4 shrink-0 bg-darkbg z-10 border-b border-white/5">
            <h1 class="text-[17px] font-semibold tracking-wide text-white" data-i18n="driver-rete-convenzionata">Rete
                Convenzionata</h1>
        </header>
        <div class="flex-1 w-full relative">
            <iframe id="map-iframe" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <div id="repair-modal"
        class="fixed inset-0 z-[100] hidden flex items-end justify-center bg-black/60 backdrop-blur-sm transition-opacity">
        <div
            class="bg-[#0a111a] w-full max-w-lg rounded-t-3xl border-t border-brand-500/30 p-6 shadow-[0_-20px_50px_rgba(0,229,255,0.15)] flex flex-col max-h-[85vh]">

            <div class="flex justify-between items-center mb-5 shrink-0">
                <h3 class="font-bold text-white flex items-center gap-2">
                    <span class="text-xl">✨</span> AI Service Agent
                </h3>
                <button onclick="document.getElementById('repair-modal').classList.add('hidden')"
                    class="text-slate-400 hover:text-brand-400 transition-colors bg-slate-800 p-1.5 rounded-full">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>

            <div id="ai-email-output"
                class="text-sm text-slate-300 overflow-y-auto hide-scrollbar prose prose-invert prose-p:leading-relaxed prose-a:text-brand-400 flex-1 mb-4">
            </div>

            <div class="mt-2 shrink-0">
                <button
                    onclick="const lang = localStorage.getItem('veritwin_lang') || 'it'; const msg = lang === 'it' ? 'Richiesta inviata con successo all\'officina!' : 'Request sent successfully to the workshop!'; document.getElementById('repair-modal').classList.add('hidden'); window.showToast(msg);"
                    class="w-full bg-[#1e293b] hover:bg-slate-700 text-brand-400 hover:text-brand-300 font-bold py-3.5 rounded-xl border border-white/10 shadow-lg transition-colors flex justify-center items-center gap-2">
                    <span class="text-lg">✉️</span> <span data-i18n="driver-send-request">Invia Richiesta</span>
                </button>
            </div>
        </div>
    </div>

    <nav
        class="fixed bottom-0 w-full max-w-lg mx-auto right-0 left-0 h-[80px] bg-[#0a111a]/90 backdrop-blur-xl border-t border-white/5 flex justify-around items-center px-2 pb-4 pt-2 z-50 rounded-t-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <button onclick="window.switchView('view-home')" id="nav-home"
            class="nav-btn flex flex-col items-center gap-1 w-16 text-brand-400">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            <span class="text-[10px] font-medium" data-i18n="driver-nav-home">Home</span>
        </button>
        <button onclick="window.pendingRepairComponent = null; window.switchView('view-map')" id="nav-map"
            class="nav-btn flex flex-col items-center gap-1 w-16 text-slate-500 hover:text-slate-300 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7">
                </path>
            </svg>
            <span class="text-[10px] font-medium" data-i18n="driver-nav-network">Network</span>
        </button>

        <button onclick="window.switchView('view-profile')" id="nav-profile"
            class="nav-btn flex flex-col items-center gap-1 w-16 text-slate-500 hover:text-slate-300 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.956 11.956 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                </path>
            </svg>
            <span class="text-[10px] font-medium" data-i18n="driver-nav-gestione">Gestione</span>
        </button>

        <button onclick="window.switchView('view-alert')" id="nav-alert"
            class="nav-btn flex flex-col items-center gap-1 w-16 text-slate-500 hover:text-slate-300 transition-colors relative">
            <div id="nav-alert-badge"
                class="hidden absolute top-0 right-3 w-2 h-2 bg-red-500 rounded-full border border-[#0a111a]"></div>
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                </path>
            </svg>
            <span class="text-[10px] font-medium" data-i18n="driver-nav-alerts">Avvisi</span>
        </button>
    </nav>

    <script type="module">
        import { renderComponentGrid } from '/static/js/driver/home_view.js?v=5';
        import { renderAlertsGrid } from '/static/js/driver/alerts_view.js?v=5';
        import { renderProfileView } from '/static/js/driver/profile_view.js?v=1';

        const DEMO_DRIVER_ID = 1;
        // compNames now handled by i18n in the render modules
        let currentVehicles = [];
        window._activeVehicleCache = null;

        window.initApp = async function () {
            try {
                const response = await fetch(`/api/driver/${DEMO_DRIVER_ID}`);
                const data = await response.json();

                if (data.error) { document.getElementById('driver-greeting').innerText = "Errore Database"; return; }

                window._driverName = data.display_name;
                const lang = localStorage.getItem('veritwin_lang') || 'it';
                const hello = (window.translations[lang] && window.translations[lang]['driver-hello']) || `Ciao, ${data.display_name}`;
                document.getElementById('driver-greeting').innerText = hello.replace(/,\s*\w+/, `, ${data.display_name}`);
                currentVehicles = data.vehicles;

                if (data.vehicles && data.vehicles.length > 0) {
                    const activeVin = data.pinned_vin || data.vehicles[0].vin;
                    renderVehicleStrip(data.vehicles, activeVin);
                    window.switchVehicle(activeVin);
                }
            } catch (err) { console.error("Pipeline Error:", err); }
        }

        function renderVehicleStrip(vehicles, activeVin) {
            const container = document.getElementById('vehicle-strip-container');
            if (!container || vehicles.length <= 1) { container.innerHTML = ''; return; }

            container.innerHTML = vehicles.map(v => `
                <div class="vehicle-chip ${v.vin === activeVin ? 'active' : ''}"
                     onclick="window.switchVehicle('${v.vin}')">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">${v.manufacturer}</p>
                    <p class="text-sm font-bold text-white">${v.model}</p>
                </div>
            `).join('');
        }

        window.switchVehicle = function (vin) {
            const activeVehicle = currentVehicles.find(v => v.vin === vin);
            if (activeVehicle) {
                window._activeVehicleCache = activeVehicle;
                document.getElementById('active-vehicle-name').innerText = `${activeVehicle.manufacturer} ${activeVehicle.model}`;
                document.getElementById('active-vehicle-vsi').innerText = activeVehicle.vsi_score;

                const photoImg = document.getElementById('active-vehicle-photo');
                if (photoImg && activeVehicle.photo_url) {
                    photoImg.src = activeVehicle.photo_url;
                    photoImg.classList.remove('hidden');
                } else if (photoImg) {
                    photoImg.classList.add('hidden');
                }

                renderVehicleStrip(currentVehicles, vin);

                renderProfileView(activeVehicle);

                loadVehicleTelemetry(vin);
            }
        };

        let _cachedComponents = null;

        async function loadVehicleTelemetry(vin) {
            try {
                const response = await fetch(`/api/driver/vehicle/${vin}/component-life`);
                const data = await response.json();
                if (data.components) {
                    _cachedComponents = data.components;
                    renderComponentGrid(data.components);
                    renderAlertsGrid(data.components);
                }
            } catch (err) { console.error("Pipeline Error:", err); }
        }

        // Re-render dynamic grids on language switch
        window.rerenderDriverApp = function () {
            if (_cachedComponents) {
                renderComponentGrid(_cachedComponents);
                renderAlertsGrid(_cachedComponents);
            }
            if (window._activeVehicleCache) {
                renderProfileView(window._activeVehicleCache);
            }
            // Update greeting with new locale
            if (window._driverName) {
                const lang = localStorage.getItem('veritwin_lang') || 'it';
                const hello = (window.translations[lang] && window.translations[lang]['driver-hello']) || `Ciao, ${window._driverName}`;
                document.getElementById('driver-greeting').innerText = hello.replace(/,\s*\w+/, `, ${window._driverName}`);
            }
            // Update map iframe if already initialized
            const mapIframe = document.getElementById('map-iframe');
            if (mapIframe) {
                const currentSrc = mapIframe.getAttribute('src');
                if (currentSrc) {
                    const lang = localStorage.getItem('veritwin_lang') || 'it';
                    const expectedSrc = `/api/fleet/map?view=suppliers&lang=${lang}`;
                    if (currentSrc !== expectedSrc) {
                        mapIframe.setAttribute('src', expectedSrc);
                    }
                }
            }
        };

        // 1. A global variable to remember what we are trying to fix
        window.pendingRepairComponent = null;

        // 2. The NEW First Step: Save state and go to the map
        window.getRepairQuote = function (componentKey) {
            window.pendingRepairComponent = componentKey;
            window.switchView('view-map');

            // Fire the smooth, non-blocking toast notification instead of the native alert
            const lang = localStorage.getItem('veritwin_lang') || 'it';
            const msg = lang === 'it'
                ? "Seleziona un'officina sulla mappa per inviare la richiesta."
                : "Select a repair shop on the map to send the request.";

            window.showToast(msg);
        };

        // 3. The NEW Second Step: Triggered AFTER the user clicks a shop on the map
        window.confirmShopAndGenerateAI = async function (shopName) {
            if (!window.pendingRepairComponent) {
                console.warn("No component selected for repair.");
                return;
            }

            const issue = _cachedComponents.find(c => `${c.category}_${c.position}` === window.pendingRepairComponent);
            if (!issue) return;

            const issueText = issue.consequence;
            const wearPercentage = (100 - issue.health_pct).toFixed(1);
            const lang = localStorage.getItem('veritwin_lang') || 'it';

            // Get the driver's name (we set this during initApp)
            const driverName = window._driverName || "Driver";

            const modal = document.getElementById('repair-modal');
            const outputDiv = document.getElementById('ai-email-output');

            modal.classList.remove('hidden');
            outputDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center py-10 text-brand-400 animate-pulse">
                    <span class="text-4xl mb-3 block">🤖</span>
                    <p class="font-medium text-center">Analisi telemetria in corso...<br>Contattando ${shopName}...</p>
                </div>`;

            try {
                const response = await fetch('/api/ai/repair-quote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        component_id: window.pendingRepairComponent,
                        issue_description: issueText,
                        wear_level: wearPercentage,
                        shop_name: shopName,       // <-- Sending the new variable
                        driver_name: driverName,   // <-- Sending the new variable
                        language: lang
                    })
                });

                if (!response.body) throw new Error("Nessuna risposta");

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                // 1. Create a safe memory variable to hold the raw markdown
                let accumulatedMarkdown = "";
                outputDiv.innerHTML = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // 2. Add the chunk to memory, keeping \n line breaks intact
                    accumulatedMarkdown += decoder.decode(value, { stream: true });

                    // 3. Parse from memory to HTML in real-time so the user sees it type!
                    if (window.marked) {
                        outputDiv.innerHTML = marked.parse(accumulatedMarkdown);
                    } else {
                        outputDiv.innerText = accumulatedMarkdown;
                    }
                }

                // Clear the pending state once successful
                window.pendingRepairComponent = null;

            } catch (error) {
                console.error("Errore:", error);
                outputDiv.innerHTML = `<div class="p-4 bg-red-900/30 border border-red-500/50 rounded-lg text-red-400 font-medium">Errore di connessione.</div>`;
            }
        };

        window.switchView = function (targetId) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
            document.getElementById(targetId).classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-brand-400');
                btn.classList.add('text-slate-500');
            });

            // --- UPDATED ROUTER MAP FOR 4 TABS ---
            const navMap = {
                'view-home': 'nav-home',
                'view-map': 'nav-map',
                'view-profile': 'nav-profile',
                'view-alert': 'nav-alert'
            };

            const activeNav = navMap[targetId];
            if (activeNav) {
                const navEl = document.getElementById(activeNav);
                navEl.classList.remove('text-slate-500');
                navEl.classList.add('text-brand-400');
            }

            if (targetId === 'view-map') {
                const lang = localStorage.getItem('veritwin_lang') || 'it';
                const iframe = document.getElementById('map-iframe');
                if (iframe) {
                    const currentSrc = iframe.getAttribute('src');
                    const repairParam = window.pendingRepairComponent ? 'active' : 'none';
                    const expectedSrc = `/api/fleet/map?view=suppliers&lang=${lang}&repair=${repairParam}`;

                    if (currentSrc !== expectedSrc) {
                        iframe.setAttribute('src', expectedSrc);
                    }
                }
            }
        };

        window.triggerSOS = function () {
            alert("AI SOS Streaming interface initializing...");
        }

        // Restore active lang toggle state on load
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('veritwin_lang') || 'it';
            window.setLanguage(savedLang);
            window.initApp();
        });

        // Helper function for non-blocking notifications
        window.showToast = function (message) {
            const container = document.getElementById('toast-container');
            document.getElementById('toast-text').innerText = message;

            // Slide in
            container.classList.remove('opacity-0', 'translate-y-[-20px]');
            container.classList.add('opacity-100', 'translate-y-0');

            // Slide out after 3.5 seconds
            setTimeout(() => {
                container.classList.remove('opacity-100', 'translate-y-0');
                container.classList.add('opacity-0', 'translate-y-[-20px]');
            }, 3500);
        };
    </script>

    <div id="toast-container"
        class="fixed top-6 left-0 right-0 z-[200] flex justify-center pointer-events-none opacity-0 translate-y-[-20px] transition-all duration-300">
        <div
            class="bg-brand-500 text-slate-900 font-bold px-5 py-2.5 rounded-full shadow-[0_5px_20px_rgba(0,229,255,0.4)] text-sm flex items-center gap-2 border border-brand-400">
            <span class="text-lg">📍</span> <span id="toast-text">Notification</span>
        </div>
    </div>

</body>

</html>
