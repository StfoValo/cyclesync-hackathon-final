<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VeriTwin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 400: '#5cffff', 500: '#00E5FF', 600: '#00b8cc' } }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-item {
            transition: all 0.3s ease;
        }

        /* Mobile styling adjustment for active state */
        .nav-item.active {
            background: rgba(0, 229, 255, 0.15);
            border-bottom: 3px solid #00E5FF;
            color: #5cffff;
        }

        @media (min-width: 768px) {
            .nav-item.active {
                border-bottom: none;
                border-left: 4px solid #00E5FF;
            }
        }

        .nav-item:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }

        .view-section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* AI Markdown Table Styling */
        .prose-ai table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.875rem;
            text-align: left;
            border-radius: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.5);
            /* Mobile Responsive Fixes */
            display: block;
            overflow-x: auto;
            white-space: nowrap;
        }

        .prose-ai th {
            background-color: rgba(0, 229, 255, 0.1);
            color: #5cffff;
            padding: 0.75rem 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .prose-ai td {
            padding: 0.75rem 1rem;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .prose-ai tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>

<body class="h-[100dvh] w-screen overflow-hidden flex flex-col md:flex-row bg-slate-900 text-slate-100 relative">
    <script src="/static/js/i18n.js?v=9"></script>

    <div class="fixed top-4 right-4 md:top-6 md:right-6 z-[60]">
        <div class="flex bg-slate-800/80 backdrop-blur-md rounded-full p-1 border border-white/10 shadow-lg">
            <button onclick="window.setLanguage('en')" id="lang-en"
                class="px-3 py-1.5 rounded-full text-xs font-bold transition-all bg-brand-500 text-slate-900 shadow-[0_0_10px_rgba(0,229,255,0.4)]">EN</button>
            <button onclick="window.setLanguage('it')" id="lang-it"
                class="px-3 py-1.5 rounded-full text-xs font-bold transition-all text-slate-400 hover:text-white">IT</button>
        </div>
    </div>

    <aside
        class="w-full md:w-72 md:bg-slate-800/70 md:backdrop-blur-[12px] md:border-r md:border-white/5 flex flex-col z-50 shadow-2xl relative shrink-0">

        <div
            class="p-4 md:p-6 pr-[90px] md:pr-6 flex items-center justify-between md:justify-start gap-3 border-b border-white/5 shrink-0 bg-[#0f172a]/90 backdrop-blur-md md:bg-transparent md:backdrop-blur-none relative z-10">
            <div class="flex items-center gap-2 shrink-0">
                <svg class="w-6 h-6 md:w-8 md:h-8 text-brand-500 drop-shadow-[0_0_8px_rgba(0,229,255,0.6)]"
                    fill="currentColor" viewBox="0 0 24 24">
                    <path d="M5.5 3L18.5 12L5.5 21V15L11.5 12L5.5 9V3Z" />
                </svg>
                <span class="text-xl md:text-2xl font-bold tracking-tight text-white">Veri<span
                        class="text-brand-500">Twin</span></span>
            </div>

            <a href="/driver"
                class="md:hidden flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-brand-500/10 border border-brand-500/40 text-brand-400 hover:bg-brand-500 hover:text-slate-900 transition-colors shadow-[0_0_10px_rgba(0,229,255,0.2)] shrink-0">
                <span data-i18n="nav-driver-app" class="text-[10px] font-bold whitespace-nowrap tracking-wide">🚗
                    App</span>
            </a>
        </div>

        <nav
            class="fixed md:static bottom-0 left-0 w-full md:w-auto flex-row md:flex-col py-2 md:py-6 flex justify-around md:justify-start gap-1 px-1 md:px-0 bg-[#0f172a]/95 md:bg-transparent backdrop-blur-xl md:backdrop-blur-none border-t border-white/10 md:border-none z-[100] pb-6 md:pb-6 overflow-x-auto hide-scrollbar">

            <button data-target="telemetry-view"
                class="nav-item active flex-col md:flex-row flex-shrink-0 text-center md:text-left px-2 py-2 md:px-6 md:py-3 text-slate-400 flex items-center justify-center md:justify-start gap-1 md:gap-3 rounded-lg md:rounded-none w-16 md:w-full">
                <svg class="w-5 h-5 md:w-5 md:h-5 text-blue-400 drop-shadow-[0_0_5px_rgba(96,165,250,0.5)]" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7">
                    </path>
                </svg>
                <span data-i18n="nav-fleet" class="text-[9px] md:text-sm font-medium">Fleet</span>
            </button>

            <button data-target="executive-view"
                class="nav-item flex-col md:flex-row flex-shrink-0 text-center md:text-left px-2 py-2 md:px-6 md:py-3 text-slate-400 flex items-center justify-center md:justify-start gap-1 md:gap-3 rounded-lg md:rounded-none w-16 md:w-full">
                <svg class="w-5 h-5 md:w-5 md:h-5 text-purple-400 drop-shadow-[0_0_5px_rgba(192,132,252,0.5)]"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                    </path>
                </svg>
                <span data-i18n="nav-risk" class="text-[9px] md:text-sm font-medium">Risk</span>
            </button>



            <button data-target="ai-view"
                class="nav-item flex-col md:flex-row flex-shrink-0 text-center md:text-left px-2 py-2 md:px-6 md:py-3 text-slate-400 flex items-center justify-center md:justify-start gap-1 md:gap-3 rounded-lg md:rounded-none w-16 md:w-full">
                <svg class="w-5 h-5 md:w-5 md:h-5 text-indigo-400 drop-shadow-[0_0_5px_rgba(129,140,248,0.5)]"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <span data-i18n="nav-ai" class="text-[9px] md:text-sm font-medium">AI Route</span>
            </button>

            <button data-target="adjuster-view"
                class="nav-item flex-col md:flex-row flex-shrink-0 text-center md:text-left px-2 py-2 md:px-6 md:py-3 text-slate-400 flex items-center justify-center md:justify-start gap-1 md:gap-3 rounded-lg md:rounded-none w-16 md:w-full relative">
                <div
                    class="absolute top-1 right-2 md:hidden w-1.5 h-1.5 bg-rose-500 rounded-full border border-[#0f172a]">
                </div>
                <svg class="w-5 h-5 md:w-5 md:h-5 text-rose-400 drop-shadow-[0_0_5px_rgba(244,63,94,0.5)]" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.956 11.956 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                    </path>
                </svg>
                <span data-i18n="nav-adjuster" class="text-[9px] md:text-sm font-medium text-rose-200">Perito</span>
            </button>

            <button data-target="esg-view"
                class="nav-item flex-col md:flex-row flex-shrink-0 text-center md:text-left px-2 py-2 md:px-6 md:py-3 text-slate-400 flex items-center justify-center md:justify-start gap-1 md:gap-3 rounded-lg md:rounded-none w-16 md:w-full">
                <svg class="w-5 h-5 md:w-5 md:h-5 text-emerald-400 drop-shadow-[0_0_5px_rgba(52,211,153,0.5)]"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                    </path>
                </svg>
                <span data-i18n="nav-esg" class="text-[9px] md:text-sm font-medium">ESG</span>
            </button>
        </nav>

        <div class="hidden md:flex flex-col p-6 border-t border-white/5 mt-auto gap-4">
            <a href="/driver"
                class="mt-2 flex items-center justify-center gap-2 w-full py-3 px-4 bg-gradient-to-r from-brand-600 to-blue-600 hover:from-brand-500 hover:to-blue-500 text-white rounded-xl shadow-[0_0_15px_rgba(0,229,255,0.3)] transition-all font-semibold text-sm group cursor-pointer border border-brand-400/50">
                <span>📱</span>
                <span data-i18n="nav-launch">Launch Driver App</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 h-full overflow-y-auto bg-slate-900 relative pb-28 md:pb-0">
        <div
            class="absolute top-0 left-0 w-full h-96 bg-brand-600/10 blur-3xl -z-10 rounded-b-[100px] pointer-events-none">
        </div>
        <div class="p-4 md:p-8 max-w-7xl mx-auto min-h-full">
            <div id="telemetry-view" class="view-section active"></div>
            <div id="executive-view" class="view-section"></div>
            <div id="ai-view" class="view-section"></div>
            <div id="esg-view" class="view-section"></div>
            <div id="adjuster-view" class="view-section"></div>
        </div>
    </main>

    <script type="module" src="/static/js/main.js?v=9"></script>
    <script type="module" src="/static/js/views/risk_chat.js"></script>
</body>

</html>
