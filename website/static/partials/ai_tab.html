<header class="mb-6 md:mb-8">
    <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight mb-1 md:mb-2">
        <span data-i18n="ai-title">AI Routing Directive</span>
    </h2>
    <p class="text-sm md:text-base text-slate-400">
        <span data-i18n="ai-subtitle">LLM-powered strategic intelligence and policy recommendations.</span>
    </p>
</header>

<div class="glass-panel rounded-xl md:rounded-2xl p-4 md:p-6 min-h-[500px] flex flex-col border border-white/5">

    <!-- Controls -->
    <div
        class="mb-6 flex flex-col md:flex-row items-start md:items-center gap-3 md:gap-4 bg-slate-800/50 p-3 md:p-4 rounded-xl border border-white/5">
        <label class="text-slate-300 font-medium whitespace-nowrap text-sm md:text-base">
            <span data-i18n="ai-sel-region">📍 Select Target Region:</span>
        </label>

        <select id="region-selector"
            class="w-full md:w-auto flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 md:px-4 py-2 md:py-2.5 text-sm md:text-base text-white focus:outline-none focus:border-brand-500 transition-colors">
            <option value="Abruzzo">Abruzzo</option>
            <option value="Basilicata">Basilicata</option>
            <option value="Calabria">Calabria</option>
            <option value="Campania">Campania</option>
            <option value="Emilia-Romagna">Emilia-Romagna</option>
            <option value="Friuli-Venezia Giulia">Friuli-Venezia Giulia</option>
            <option value="Lazio">Lazio</option>
            <option value="Liguria">Liguria</option>
            <option value="Lombardia">Lombardia</option>
            <option value="Marche">Marche</option>
            <option value="Molise">Molise</option>
            <option value="Piemonte">Piemonte</option>
            <option value="Puglia">Puglia</option>
            <option value="Sardegna">Sardegna</option>
            <option value="Sicilia">Sicilia</option>
            <option value="Toscana">Toscana</option>
            <option value="Trentino-Alto Adige">Trentino-Alto Adige</option>
            <option value="Umbria">Umbria</option>
            <option value="Valle d'Aosta">Valle d'Aosta</option>
            <option value="Veneto">Veneto</option>
        </select>

        <button id="btn-analyze"
            class="w-full md:w-auto bg-[#5A32FA] hover:bg-[#4a24de] text-white px-4 md:px-6 py-2.5 rounded-lg text-sm md:text-base font-medium transition-colors shadow-lg shadow-brand-500/20 flex items-center justify-center gap-2">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z">
                </path>
            </svg>
            <span data-i18n="ai-btn-gen">Generate Strategy</span>
        </button>
    </div>

    <!-- Main Content Split -->
    <div class="flex-1 flex flex-col lg:flex-row gap-8 lg:gap-12 mt-4 items-center lg:items-stretch">

        <!-- LEFT: Phone Widget (Wider, taller, and pushed left) -->
        <div class="w-full lg:flex-[0.8] flex justify-center lg:justify-start lg:pl-4 items-center">

            <div
                class="w-[320px] md:w-[380px] h-[600px] md:h-[680px] bg-black rounded-[2.5rem] md:rounded-[3rem] border-[10px] md:border-[12px] border-slate-800 shadow-2xl relative overflow-hidden flex flex-col shrink-0">
                <div class="absolute inset-0 bg-gradient-to-br from-indigo-900 via-slate-800 to-black z-0"></div>

                <!-- Phone Status Bar -->
                <div
                    class="relative z-10 flex justify-between items-center px-6 pt-4 pb-2 text-white text-xs font-semibold">
                    <span>9:41</span>
                    <div class="flex gap-1.5 items-center">
                        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                        </svg>
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M2 22h20V2z" />
                        </svg>
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z" />
                        </svg>
                    </div>
                </div>

                <!-- Phone Content Area (min-h-0 added here) -->
                <div class="w-full lg:flex-[0.8] flex justify-center lg:justify-start lg:pl-4 items-center">

                    <div
                        class="w-[320px] md:w-[380px] h-[600px] md:h-[680px] bg-black rounded-[2.5rem] md:rounded-[3rem] border-[10px] md:border-[12px] border-slate-800 shadow-2xl relative overflow-hidden flex flex-col shrink-0">
                        <div class="absolute inset-0 bg-gradient-to-br from-indigo-900 via-slate-800 to-black z-0">
                        </div>

                        <div
                            class="relative z-10 flex justify-between items-center px-6 pt-4 pb-2 text-white text-xs font-semibold">
                            <span>9:41</span>
                            <div class="flex gap-1.5 items-center">
                                <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                                    <path
                                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                                </svg>
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M2 22h20V2z" />
                                </svg>
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                    <path
                                        d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z" />
                                </svg>
                            </div>
                        </div>

                        <div
                            class="relative z-10 mx-4 mt-6 md:mt-8 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 shadow-lg flex flex-col flex-1 mb-6 min-h-0">
                            <div class="flex justify-between items-center border-b border-white/10 px-4 py-3 shrink-0">
                                <div class="flex items-center gap-2">
                                    <div class="w-6 h-6 rounded bg-brand-500 flex items-center justify-center shadow">
                                        <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                                d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                                        </svg>
                                    </div>
                                    <span class="text-white text-sm font-semibold tracking-wide"><span
                                            data-i18n="ai-term-title">Telematics AI</span></span>
                                </div>
                                <span class="text-slate-300 text-xs"><span data-i18n="ai-term-now">Now</span></span>
                            </div>

                            <div class="p-4 flex-1 overflow-hidden flex flex-col min-h-0">
                                <div id="ai-terminal"
                                    class="text-white text-[13px] md:text-sm leading-relaxed overflow-y-auto flex-1 whitespace-pre-wrap pr-3 pb-4">
                                    <span data-i18n="ai-term-wait">Awaiting actuarial input...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT: KPI Funnel -->
                <div class="w-full lg:flex-[1.2] flex flex-col justify-center gap-4 md:gap-6 mt-6 lg:mt-0">
                    <h3 class="text-lg md:text-xl font-bold text-white mb-2 text-center lg:text-left">
                        <span data-i18n="ai-funnel-title">📈 Post-Dispatch Conversion Funnel</span>
                    </h3>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6">
                        <div
                            class="glass-panel rounded-xl p-4 md:p-6 border border-white/5 shadow-lg flex flex-col gap-1 md:gap-2">
                            <p class="text-slate-300 font-medium text-xs md:text-sm">
                                <span data-i18n="ai-kpi-target">Total Devices Targeted</span>
                            </p>
                            <p class="text-2xl md:text-3xl font-bold text-[#00A67E]" id="ai-kpi-targeted">---</p>
                        </div>
                        <div
                            class="glass-panel rounded-xl p-4 md:p-6 border border-white/5 shadow-lg flex flex-col gap-1 md:gap-2">
                            <p class="text-slate-300 font-medium text-xs md:text-sm">
                                <span data-i18n="ai-kpi-open">Notification Open Rate</span>
                            </p>
                            <p class="text-2xl md:text-3xl font-bold text-[#00A67E]" id="ai-kpi-opened">---</p>
                        </div>
                        <div
                            class="glass-panel rounded-xl p-4 md:p-6 border border-white/5 shadow-lg flex flex-col gap-1 md:gap-2">
                            <p class="text-slate-300 font-medium text-xs md:text-sm">
                                <span data-i18n="ai-kpi-booked">Repairs Booked (Network)</span>
                            </p>
                            <p class="text-2xl md:text-3xl font-bold text-[#00A67E]" id="ai-kpi-booked">---</p>
                        </div>
                        <div
                            class="glass-panel rounded-xl p-4 md:p-6 border border-white/5 shadow-lg flex flex-col gap-1 md:gap-2">
                            <p class="text-slate-300 font-medium text-xs md:text-sm">
                                <span data-i18n="ai-kpi-roi">Est. Claims Prevented (ROI)</span>
                            </p>
                            <p class="text-2xl md:text-3xl font-bold text-[#00A67E]" id="ai-kpi-roi">---</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
