<header class="mb-8">
    <h2 class="text-3xl font-bold text-white tracking-tight mb-2">AI Routing Directive</h2>
    <p class="text-slate-400">LLM-powered strategic intelligence and policy recommendations.</p>
</header>
<div class="glass-panel rounded-2xl p-6 min-h-[500px] flex flex-col border border-white/5">
    <div class="mb-4 flex items-center gap-4">
        <label class="text-slate-300 font-medium">📍 Select Target Region:</label>
        <select id="region-selector"
            class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand-500 transition-colors">
            <option value="Abruzzo">Abruzzo</option>
            <option value="Basilicata">Basilicata</option>
            <option value="Calabria">Calabria</option>
            <option value="Campania">Campania</option>
            <option value="Emilia-Romagna">Emilia-Romagna</option>
            <option value="Friuli-Venezia Giulia">Friuli-Venezia Giulia</option>
            <option value="Lazio">Lazio</option>
            <option value="Liguria">Liguria</option>
            <option value="Lombardia">Lombardia</option>
            <option value="Marche">Marche</option>
            <option value="Molise">Molise</option>
            <option value="Piemonte">Piemonte</option>
            <option value="Puglia">Puglia</option>
            <option value="Sardegna">Sardegna</option>
            <option value="Sicilia">Sicilia</option>
            <option value="Toscana">Toscana</option>
            <option value="Trentino-Alto Adige">Trentino-Alto Adige</option>
            <option value="Umbria">Umbria</option>
            <option value="Valle d'Aosta">Valle d'Aosta</option>
            <option value="Veneto">Veneto</option>
        </select>
        <button id="btn-analyze"
            class="bg-[#5A32FA] hover:bg-[#4a24de] text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-lg shadow-brand-500/20 flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z">
                </path>
            </svg>
            Generate Intervention Strategy
        </button>
    </div>

    <div class="flex-1 flex flex-col lg:flex-row gap-8 mt-6">
        <!-- LEFT COLUMN: Phone -->
        <div class="flex-1 flex justify-center items-center">
            <!-- Adjusted width, height, and border to look more like a real device -->
            <div
                class="w-[300px] h-[620px] bg-black rounded-[3rem] border-[12px] border-slate-800 shadow-2xl relative overflow-hidden flex flex-col shrink-0">
                <!-- Background wallpaper -->
                <div class="absolute inset-0 bg-gradient-to-br from-indigo-900 via-slate-800 to-black z-0"></div>

                <!-- Top lock-screen header -->
                <div
                    class="relative z-10 flex justify-between items-center px-6 pt-4 pb-2 text-white text-xs font-semibold">
                    <span>9:41</span>
                    <div class="flex gap-1.5 items-center">
                        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                        </svg>
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M2 22h20V2z" />
                        </svg>
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z" />
                        </svg>
                    </div>
                </div>

                <!-- Push Notification Card -->
                <div
                    class="relative z-10 mx-4 mt-8 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 shadow-lg flex flex-col">
                    <!-- Card Header -->
                    <div class="flex justify-between items-center border-b border-white/10 px-4 py-3">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 rounded bg-brand-500 flex items-center justify-center shadow">
                                <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                        d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                                </svg>
                            </div>
                            <span class="text-white text-sm font-semibold tracking-wide">Telematics AI</span>
                        </div>
                        <span class="text-slate-300 text-xs">Now</span>
                    </div>
                    <!-- Card Body -->
                    <div class="p-4">
                        <div id="ai-terminal"
                            class="text-white text-sm leading-relaxed overflow-y-auto max-h-[420px] whitespace-pre-wrap">
                            Awaiting actuarial input...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN: Analytics -->
        <div class="flex-1 lg:flex-[1.2] flex flex-col justify-center gap-6">
            <h3 class="text-xl font-bold text-white mb-2">📈 Post-Dispatch Conversion Funnel</h3>

            <!-- Converted to a 2x2 Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-panel rounded-xl p-6 border border-white/5 shadow-lg flex flex-col gap-2">
                    <p class="text-slate-300 font-medium text-sm">Total Devices Targeted</p>
                    <p class="text-3xl font-bold text-[#00A67E]" id="ai-kpi-targeted">---</p>
                </div>

                <div class="glass-panel rounded-xl p-6 border border-white/5 shadow-lg flex flex-col gap-2">
                    <p class="text-slate-300 font-medium text-sm">Notification Open Rate</p>
                    <p class="text-3xl font-bold text-[#00A67E]" id="ai-kpi-opened">---</p>
                </div>

                <div class="glass-panel rounded-xl p-6 border border-white/5 shadow-lg flex flex-col gap-2">
                    <p class="text-slate-300 font-medium text-sm">Repairs Booked (Network)</p>
                    <p class="text-3xl font-bold text-[#00A67E]" id="ai-kpi-booked">---</p>
                </div>

                <div class="glass-panel rounded-xl p-6 border border-white/5 shadow-lg flex flex-col gap-2">
                    <p class="text-slate-300 font-medium text-sm">Est. Claims Prevented (ROI)</p>
                    <p class="text-3xl font-bold text-[#00A67E]" id="ai-kpi-roi">---</p>
                </div>
            </div>
        </div>
    </div>
</div>
