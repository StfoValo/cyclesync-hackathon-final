<header class="mb-6 md:mb-8 flex flex-col md:flex-row md:justify-between md:items-end gap-4">
    <div>
        <div class="flex items-center gap-3 mb-1 md:mb-2">
            <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path>
            </svg>
            <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight"><span data-i18n="tel-title">Live Fleet Telemetry</span></h2>
        </div>
        <p class="text-sm md:text-base text-slate-400"><span data-i18n="tel-subtitle">Real-time geographical tracking and fleet metrics.</span></p>
    </div>
    <div class="flex bg-slate-800/80 backdrop-blur-sm rounded-lg p-1 border border-white/10 w-full md:w-auto">
        <button id="btn-view-fleet"
            class="flex-1 md:flex-none px-3 md:px-5 py-2 md:py-2.5 rounded-md text-xs md:text-sm font-medium bg-brand-600 text-white shadow-lg transition-all whitespace-nowrap">
            <span data-i18n="tel-btn-live">Live Monitored Fleet</span>
        </button>
        <button id="btn-view-registry"
            class="flex-1 md:flex-none px-3 md:px-5 py-2 md:py-2.5 rounded-md text-xs md:text-sm font-medium text-slate-400 hover:text-white transition-all whitespace-nowrap">
            <span data-i18n="tel-btn-registry">Registry</span>
        </button>
        <button id="btn-view-suppliers"
            class="flex-1 md:flex-none px-3 md:px-5 py-2 md:py-2.5 rounded-md text-xs md:text-sm font-medium text-slate-400 hover:text-white transition-all whitespace-nowrap">
            <span data-i18n="tel-btn-network">Conventioned Network</span>
        </button>
    </div>
</header>

<!-- ── Map View ──────────────────────────────────────────────────────── -->
<div id="map-view-panel" class="grid grid-cols-1 gap-4 md:gap-6">
    <div class="glass-panel rounded-xl md:rounded-2xl p-2 md:p-6 h-[400px] md:h-[600px] flex items-center justify-center border border-white/5 overflow-hidden">
        <iframe id="map-frame" style="width: 100%; height: 100%; border: none; border-radius: 8px;"></iframe>
    </div>
</div>

<!-- ── Registry View ──────────────────────────────────────────────── -->
<div id="registry-view-panel" class="hidden">
    <!-- Search Bar -->
    <div class="flex flex-col md:flex-row gap-3 mb-6">
        <div class="relative flex-1">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            </div>
            <input type="text" id="vehicle-search-input" data-i18n-placeholder="reg-search-placeholder" placeholder="Search by plate, VIN, driver, or model…"
                class="w-full pl-12 pr-4 py-3 bg-slate-800/60 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:border-brand-500/50 focus:ring-1 focus:ring-brand-500/30 transition-all text-sm" />
            <div id="vehicle-search-dropdown" class="hidden absolute left-0 right-0 top-full mt-2 bg-slate-800/95 backdrop-blur-lg border border-white/10 rounded-xl shadow-2xl z-50 max-h-80 overflow-y-auto"></div>
        </div>
        <button id="btn-search-vehicle" class="px-5 py-3 bg-brand-600 hover:bg-brand-500 text-white rounded-xl font-medium transition-colors flex items-center gap-2 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <span data-i18n="reg-btn-inspect">Inspect</span>
        </button>
        <button id="btn-register-vehicle" class="px-5 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-medium transition-colors flex items-center gap-2 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span data-i18n="reg-btn-register">Register</span>
        </button>
    </div>

    <!-- Filters -->
    <div class="glass-panel rounded-xl p-4 mb-6 border border-white/5">
        <div class="flex flex-wrap gap-3 items-end">
            <div class="flex-1 min-w-[140px]"><label class="text-[10px] text-slate-400 uppercase font-bold mb-1 block" data-i18n="reg-filter-mfr">Manufacturer</label>
                <select id="filter-manufacturer" class="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white"><option value="" data-i18n="reg-opt-all-brands">All Brands</option></select></div>
            <div class="flex-1 min-w-[140px]"><label class="text-[10px] text-slate-400 uppercase font-bold mb-1 block" data-i18n="reg-filter-model">Model</label>
                <select id="filter-model" disabled class="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white"><option value="" data-i18n="reg-opt-all-models">All Models</option></select></div>
            <div class="flex-1 min-w-[120px]"><label class="text-[10px] text-slate-400 uppercase font-bold mb-1 block" data-i18n="reg-filter-engine">Engine</label>
                <select id="filter-powertrain" class="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white"><option value="" data-i18n="reg-opt-all-types">All Types</option></select></div>
            <div class="flex-1 min-w-[120px]"><label class="text-[10px] text-slate-400 uppercase font-bold mb-1 block" data-i18n="reg-filter-region">Region</label>
                <select id="filter-region" class="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white"><option value="" data-i18n="reg-opt-all-regions">All Regions</option></select></div>
            <div class="flex-1 min-w-[120px]"><label class="text-[10px] text-slate-400 uppercase font-bold mb-1 block" data-i18n="reg-filter-bodytype">Body Type</label>
                <select id="filter-bodytype" class="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white"><option value="" data-i18n="reg-opt-all">All</option></select></div>
            <div class="flex-1 min-w-[120px]"><label class="text-[10px] text-slate-400 uppercase font-bold mb-1 block" data-i18n="reg-filter-insurance">Insurance</label>
                <select id="filter-policy" class="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white">
                    <option value="" data-i18n="reg-opt-all">All</option><option value="active" data-i18n="reg-opt-active">Active</option><option value="expired" data-i18n="reg-opt-expired">Expired</option></select></div>
            <div class="flex-1 min-w-[120px]"><label class="text-[10px] text-slate-400 uppercase font-bold mb-1 block" data-i18n="reg-filter-blackbox">Blackbox</label>
                <select id="filter-blackbox" class="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white">
                    <option value="" data-i18n="reg-opt-all">All</option><option value="1" data-i18n="reg-opt-active">Active</option><option value="0" data-i18n="reg-opt-none">None</option></select></div>
            <div class="flex items-end"><button id="btn-clear-filters" class="text-xs text-slate-400 hover:text-white transition-colors py-2" data-i18n="reg-clear">× Clear</button></div>
        </div>
    </div>

    <!-- Registry Table -->
    <div class="glass-panel rounded-xl border border-white/5 overflow-x-auto hide-scrollbar">
        <table class="w-full text-left min-w-[700px]">
            <thead>
                <tr class="border-b border-white/5 text-xs text-slate-400 uppercase tracking-wider">
                    <th class="px-4 py-3 cursor-pointer hover:text-white transition-colors" data-sort="plate_number"><span data-i18n="reg-th-plate">Plate</span> ↕</th>
                    <th class="px-4 py-3 cursor-pointer hover:text-white transition-colors" data-sort="model"><span data-i18n="reg-th-model">Model</span> ↕</th>
                    <th class="px-4 py-3 hidden md:table-cell" data-i18n="reg-th-driver">Driver</th>
                    <th class="px-4 py-3 hidden lg:table-cell" data-i18n="reg-th-region">Region</th>
                    <th class="px-4 py-3 cursor-pointer hover:text-white transition-colors" data-sort="vsi_score"><span data-i18n="reg-th-vsi">VSI</span> ↕</th>
                    <th class="px-4 py-3 hidden md:table-cell" data-i18n="reg-th-engine">Engine</th>
                    <th class="px-4 py-3 hidden lg:table-cell" data-i18n="reg-th-insurance">Insurance</th>
                    <th class="px-4 py-3 hidden lg:table-cell text-center" data-i18n="reg-th-blackbox">Blackbox</th>
                    <th class="px-4 py-3 hidden xl:table-cell cursor-pointer hover:text-white" data-sort="odometer"><span data-i18n="reg-th-odometer">Odometer</span> ↕</th>
                </tr>
            </thead>
            <tbody id="registry-table-body">
                <tr><td colspan="9" class="px-4 py-8 text-center text-slate-500" data-i18n="reg-loading">Loading…</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="flex items-center justify-between mt-4 text-sm">
        <span id="registry-count" class="text-slate-400">0 <span data-i18n="reg-vehicles">vehicles</span></span>
        <div class="flex items-center gap-3">
            <button id="btn-prev-page" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-white rounded-lg border border-white/10 text-xs disabled:opacity-30" data-i18n="reg-prev" disabled>← Prev</button>
            <span id="registry-page-info" class="text-slate-400 text-xs"><span data-i18n="reg-page">Page</span> 1 <span data-i18n="reg-of">of</span> 1</span>
            <button id="btn-next-page" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-white rounded-lg border border-white/10 text-xs disabled:opacity-30" data-i18n="reg-next" disabled>Next →</button>
        </div>
    </div>
</div>

<!-- ── Vehicle Passport Panel ─────────────────────────────────────── -->
<div id="vehicle-passport-panel" class="hidden">
    <div class="flex items-center justify-between mb-6">
        <button id="btn-close-passport" class="flex items-center gap-2 text-sm text-slate-400 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            <span data-i18n="pass-back">Back to Registry</span>
        </button>
    </div>

    <div class="glass-panel rounded-2xl p-6 border border-white/5 mb-6">
        <div class="flex items-start gap-4 mb-6">
            <div id="passport-icon" class="shrink-0"></div>
            <div class="flex-1">
                <h2 id="passport-model" class="text-xl font-bold text-white"></h2>
                <div class="flex items-center gap-3 mt-1 flex-wrap">
                    <span id="passport-plate" class="font-mono font-bold text-sm bg-black/40 px-2 py-1 rounded border border-slate-700 text-white"></span>
                    <span id="passport-powertrain" class="text-xs text-slate-400"></span>
                    <span id="passport-blackbox" class="hidden text-xs px-2 py-0.5 rounded-full"></span>
                </div>
                <p id="passport-driver" class="text-sm text-slate-400 mt-1"></p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 mb-1" data-i18n="pass-vsi">VSI Score</p>
                <span id="passport-vsi" class="text-3xl font-black text-emerald-400">—</span>
            </div>
        </div>

        <!-- Components -->
        <div class="mb-6">
            <h3 class="text-sm font-bold text-white mb-3 uppercase tracking-wider" data-i18n="pass-components">Components Health</h3>
            <div id="passport-components" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>

        <!-- Insurance -->
        <button class="accordion-trigger w-full flex items-center justify-between py-3 border-t border-white/5 text-sm font-bold text-white" data-target="accordion-insurance">
            <span data-i18n="pass-insurance">Insurance & Policy</span> <svg class="w-4 h-4 accordion-chevron transition-transform text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="accordion-insurance" class="hidden">
            <div class="flex items-center gap-2 mb-3"><span id="passport-insurance-badge" class="text-xs px-2 py-0.5 rounded-full">—</span></div>
            <div id="passport-insurance-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
        </div>

        <!-- Telemetry -->
        <button class="accordion-trigger w-full flex items-center justify-between py-3 border-t border-white/5 text-sm font-bold text-white" data-target="accordion-telemetry">
            <span data-i18n="pass-telemetry">Live Telemetry</span> <svg class="w-4 h-4 accordion-chevron transition-transform text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="accordion-telemetry" class="hidden">
            <div id="passport-telemetry-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
        </div>

        <!-- Maintenance History -->
        <button class="accordion-trigger w-full flex items-center justify-between py-3 border-t border-white/5 text-sm font-bold text-white" data-target="accordion-history">
            <span data-i18n="pass-history">Maintenance History</span> <svg class="w-4 h-4 accordion-chevron transition-transform text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="accordion-history" class="hidden">
            <div id="passport-history-timeline" class="border-l-2 border-white/10 ml-2 pl-4 space-y-4"></div>
        </div>
    </div>
</div>
